<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Task</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Main Card Component -->
  <div class="card">
    <div class="card-image-area">
      <!-- Pure CSS Image Icon Placeholder -->
      <div class="css-image-icon">
        <div class="icon-mountain-large"></div>
        <div class="icon-mountain-small"></div>
        <div class="icon-sun"></div>
      </div>
    </div>
    <div class="card-content">
      <span class="badge">Label</span>
      <h2 class="card-title">Heading</h2>
      <p class="card-description">This is a short description about the card.</p>
      <button class="action-btn">Action</button>
    </div>
  </div>
</body>
</html>
